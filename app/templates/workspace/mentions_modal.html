<!-- Mentions & My Comments Modal (included in base.html) -->
<div class="modal fade" id="mentionsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-chat-dots"></i> Comments & Mentions
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Tabs -->
                <ul class="nav nav-tabs mb-3" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="mentions-tab" data-bs-toggle="tab" data-bs-target="#mentions-pane"
                                type="button" role="tab" aria-controls="mentions-pane" aria-selected="true">
                            <i class="bi bi-bell"></i> Your Mentions
                            <span id="mentionsTabBadge" class="badge bg-danger ms-1" style="display: none;">0</span>
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="my-comments-tab" data-bs-toggle="tab" data-bs-target="#my-comments-pane"
                                type="button" role="tab" aria-controls="my-comments-pane" aria-selected="false">
                            <i class="bi bi-pencil-square"></i> My Comments
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content">
                    <!-- Your Mentions Tab -->
                    <div class="tab-pane fade show active" id="mentions-pane" role="tabpanel" aria-labelledby="mentions-tab">
                        <div id="mentionsContainer">
                            <div class="text-center text-muted p-4">
                                <div class="spinner-border" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading mentions...</p>
                            </div>
                        </div>
                    </div>

                    <!-- My Comments Tab -->
                    <div class="tab-pane fade" id="my-comments-pane" role="tabpanel" aria-labelledby="my-comments-tab">
                        <div id="myCommentsContainer">
                            <div class="text-center text-muted p-4">
                                <div class="spinner-border" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading your comments...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="markAllReadBtn">
                    Mark All Mentions as Read
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
