{% extends "base.html" %}

{% block title %}Simplification Analysis{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Page Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h2 mb-0">
                        <i class="fas fa-chart-line text-success me-2"></i>
                        Simplification Analysis
                    </h1>
                    <p class="text-muted mb-0">Opportunities to improve user experience and reduce complexity</p>
                </div>
                <div>
                    <a href="{{ url_for('super_admin.documentation') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Documentation
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Analysis Content (Markdown) -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="markdown-content">
                        <pre style="white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', monospace;">{{ analysis_content }}</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.markdown-content pre {
    background-color: #f8f9fa;
    padding: 20px;
    border-radius: 8px;
    line-height: 1.6;
}
</style>
{% endblock %}
