{# Reusable impact level dropdown — include in create/edit forms #}
{# Requires: impact_levels_config (from context processor), current_impact (optional) #}

{% if impact_levels_config %}
<div class="mb-4">
    <label class="form-label fw-semibold">Impact Level</label>
    <select name="impact_level" class="form-select">
        <option value="" {% if not current_impact %}selected{% endif %}>Not set</option>
        {% for lvl in [1, 2, 3] %}
        {% if lvl in impact_levels_config %}
        {% set il = impact_levels_config[lvl] %}
        <option value="{{ lvl }}" {% if current_impact == lvl %}selected{% endif %}>
            {{ il.icon }}
        </option>
        {% endif %}
        {% endfor %}
    </select>
</div>
{% endif %}
