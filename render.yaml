services:
  # OLD App - Visualization Tool
  - type: web
    name: cisk-navigator-viz
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # CISK Navigator v2.0 - Full Data Collection & Management
  - type: web
    name: cisk-navigator-app
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
