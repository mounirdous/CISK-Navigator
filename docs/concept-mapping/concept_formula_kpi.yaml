    affected_files:
      - "app/models/value_type.py (_calculate_formula_value, add elif)"
      - "app/templates/workspace/_calculation_config_modal.html (add option)"
      - "app/routes/workspace.py (add to valid_operations)"
    testing_required:
      - "Unit test for median calculation"
      - "UI test to select median from dropdown"
    estimated_effort: "2 hours"

  - change: "Add autocomplete for advanced expressions"
    affected_files:
      - "app/templates/workspace/_calculation_config_modal.html (add JS autocomplete)"
      - "Static assets (may need CodeMirror or similar library)"
    new_dependencies: "CodeMirror or Monaco Editor"
    testing_required:
      - "UI test for autocomplete functionality"
    estimated_effort: "1 day"

  - change: "Implement full circular dependency validation"
    affected_files:
      - "app/routes/workspace.py (add validation in update_calculation_config)"
      - "New service: app/services/dependency_validator.py"
    operations:
      - "Build dependency graph for all formulas"
      - "Detect cycles using DFS/topological sort"
      - "Return error if cycle detected"
    testing_required:
      - "Create complex circular chains"
      - "Verify blocked at save time"
    estimated_effort: "1 day"

  - change: "Cache formula results (performance optimization)"
    affected_files:
      - "app/models/value_type.py (add caching decorator)"
      - "Database migration (add formula_result_cache column?)"
    considerations:
      - "When to invalidate cache?"
      - "Cache per snapshot or current value?"
      - "Redis for distributed cache?"
    estimated_effort: "2-3 days"
    risk: "Cache invalidation is hard"

# Related Concepts
