    file: "docs/concept-mapping/concept_calculation_type.yaml"

  - concept: "Consensus Calculation"
    relation: "Formula overrides normal consensus mechanism"
    note: "Formula KPIs don't use contributions"

  - concept: "Linked KPI"
    relation: "Both auto-update, but linked reads from another KPI"
    difference: "Formula calculates, Linked copies"

  - concept: "Value Type"
    relation: "Formula only works with numeric value types"
    validation: "Backend blocks qualitative sources"

  - concept: "KPI Snapshot"
    relation: "Snapshots capture formula results at point in time"
