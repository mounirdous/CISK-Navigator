# Performance Considerations
performance:
  calculation_overhead:
    - "Formula calculated on-demand (every page load)"
    - "Recursive calls to get source values"
    - "Complex formulas with many sources = slower"
    - "No caching currently implemented"

  optimization_opportunities:
    - "Cache formula results until source changes"
    - "Lazy load formula details in grid view"
    - "Batch calculate all formulas in background job"
    - "Denormalize formula result into snapshots"

  scaling_concerns:
    - "What if 1000 KPIs depend on one source?"
    - "Deep dependency chains (KPI → KPI → KPI → ...)"
    - "Circular reference detection overhead"

# Security Considerations
security:
  expression_evaluation:
    library: "simpleeval (sandboxed)"
    safe: true
    cannot_access:
      - "Filesystem"
      - "Network"
      - "System calls"
      - "Arbitrary imports"
    allowed:
      - "Math operations"
      - "Whitelisted functions"
      - "KPI variables only"

  injection_prevention:
    - "Expression parsed by simpleeval, not eval()"
    - "No code execution outside sandbox"
    - "Whitelisted functions only"

  permission_check:
    - "can_manage_kpis required to create formula"
    - "No permission to update source KPIs"
    - "Cannot create formula with KPIs from other orgs (yet)"

