  - version: "1.15.0"
    changes: ["Added linked KPI type"]

  - version: "1.19.0"
    changes:
      - "Major refactor: Unified calculation type handling"
      - "Single modal for all type switches"
      - "Improved formula builder UX"

  - version: "1.22.0"
    changes: ["Added is_org_admin flag (not related to calc type)"]

# Metadata
metadata:
  last_updated: "2026-03-13"
  complexity: "HIGH"  # Core feature with many interactions
  criticality: "CRITICAL"  # Everything depends on this
  stability: "STABLE"  # Mature feature, few changes expected
  technical_debt: "MEDIUM"  # Some refactoring opportunities
  test_coverage: "60%"  # Needs more edge case tests
